name: Test and Merge branches 

on:
  push:
    branches:
      - test

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: python test.py

  merge-to-master:
    name: Merge Test to Master
    runs-on: ubuntu-latest
    needs: run-tests
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Merge Test into Master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base master --head test --json number --jq 'length')
          if [[ "$PR_EXISTS" -eq 0 ]]; then
            gh pr create --base master --head test --title "Merge test into master" --body "Automatically merging test into master after successful tests."
          fi
          PR_NUMBER=$(gh pr list --base master --head test --json number --jq '.[0].number')
          if [[ -n "$PR_NUMBER" ]]; then
            MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable --jq '.mergeable')
            echo "Mergeable status: $MERGEABLE"
            if [[ "$MERGEABLE" == "MERGEABLE" ]]; then
              gh pr merge "$PR_NUMBER" --squash --auto
            else
              echo "❌ PR #$PR_NUMBER is not mergeable. Resolve conflicts manually."
              exit 1
            fi
          fi
