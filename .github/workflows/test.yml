name: Test and Auto Merge

on:
  push:
    branches:
      - test

jobs:
  run-tests:
    name: Run Pytest on Test Branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest  # Ensure pytest is installed

      - name: Run Pytest
        run: pytest test.py  # Runs pytest on test.py

  create-pr:
    name: Create Pull Request
    needs: run-tests
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Pull Request if Not Exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base master --head test --json number --jq 'length')
          if [[ "$PR_EXISTS" -eq 0 ]]; then
            gh pr create --base master --head test --title "Merge test into master" --body "Auto-generated PR after passing tests."
          else
            echo "PR already exists."
          fi

  merge-pr:
    name: Merge Pull Request
    needs: create-pr
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ensure Test Branch Exists and Fetch Latest Changes
        run: |
          git fetch --all
          if git show-ref --verify --quiet refs/remotes/origin/test; then
            git checkout test
            git pull origin test
          else
            echo "❌ Test branch not found. Exiting."
            exit 1
          fi

      - name: Check PR Mergeability and Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --base master --head test --json number --jq '.[0].number')

          if [[ -n "$PR_NUMBER" ]]; then
            MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable --jq '.mergeable')
            echo "Mergeable status: $MERGEABLE"

            if [[ "$MERGEABLE" == "MERGEABLE" ]]; then
              gh pr merge "$PR_NUMBER" --squash --auto
            else
              echo "⚠️ Merge conflict detected. Resolving automatically by preferring test branch."

              git config --global user.email "github-actions@github.com"
              git config --global user.name "GitHub Actions"

              # Ensure master is up-to-date
              git checkout master || git checkout -b master origin/master
              git pull origin master

              # Merge test into master, preferring test's changes
              git merge --strategy=recursive -X theirs test || (
                echo "✅ Merge conflicts resolved by preferring test branch"
                git add .
                git commit -m "Resolved merge conflicts by preferring test branch"
              )

              # Push resolved merge to master
              git push origin master

              # Close PR as merged
              gh pr close "$PR_NUMBER" --comment "Merged automatically with incoming changes from test."
            fi
          else
            echo "No open PR found."
          fi
