name: Test and Merge

on:
  push:
    branches:
      - test

permissions:
  contents: write

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest  

      - name: Run Pytest
        run: pytest test.py  # Runs test.py with pytest

  merge-to-master:
    name: Merge Test to Master
    runs-on: ubuntu-latest
    needs: run-tests
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to prevent issues

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure Test and Master Are Up-to-Date
        run: |
          git fetch origin
          git checkout master
          git pull origin master
          git checkout test
          git pull origin test

      - name: Check If There Are Changes to Merge
        id: check_changes
        run: |
          AHEAD_BY=$(git rev-list --count master..test)
          if [[ "$AHEAD_BY" -eq 0 ]]; then
            echo "No new commits to merge. Exiting."
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "New commits found in test branch. Proceeding with merge."
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Merge Test into Master (Keep Master Changes)
        if: env.has_changes == 'true'
        run: |
          git checkout master
          git merge --no-ff --strategy=recursive -X ours test || (
            echo "❌ Merge conflict occurred, resolving automatically using 'ours' strategy (keeping master changes)."
            git add .
            git commit -m "Resolved merge conflicts by keeping existing master changes"
          )

      - name: Show Git Log Before Push
        if: env.has_changes == 'true'
        run: git log --oneline --graph --decorate --all -n 10

      - name: Push Merged Changes
        if: env.has_changes == 'true'
        run: git push origin master --force
