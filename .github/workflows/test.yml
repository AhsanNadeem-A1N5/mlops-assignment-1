name: Test and Merge

on:
  push:
    branches:
      - test

permissions:
  contents: write

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest  

      - name: Run Pytest
        run: pytest test.py  # Runs test.py with pytest

  merge-to-master:
    name: Merge Test to Master
    runs-on: ubuntu-latest
    needs: run-tests
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure Latest Master
        run: |
          git fetch origin master
          git checkout master
          git pull origin master

      - name: Merge Test into Master (Keep Master Changes)
        run: |
          git merge --strategy=recursive -X ours test || (
            echo "❌ Merge conflict occurred, resolving automatically using 'ours' strategy (keeping master changes)."
            git add .
            git commit -m "Resolved merge conflicts by preferring existing master changes"
          )

      - name: Push Merged Changes
        run: git push origin master
