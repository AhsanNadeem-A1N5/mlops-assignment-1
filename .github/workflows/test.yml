name: Auto Merge Dev into Test

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Merge Dev into Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all branches

      - name: Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Create Pull Request if Not Exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base test --head dev --json number --jq 'length')
          if [[ "$PR_EXISTS" -eq 0 ]]; then
            gh pr create --base test --head dev --title "Merge dev into test" --body "Auto PR from dev to test"
          else
            echo "PR already exists."
          fi

      - name: Check PR Mergeability and Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --base test --head dev --json number --jq '.[0].number')
          
          if [[ -n "$PR_NUMBER" ]]; then
            MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable --jq '.mergeable')
            echo "Mergeable status: $MERGEABLE"

            if [[ "$MERGEABLE" == "MERGEABLE" ]]; then
              gh pr merge "$PR_NUMBER" --squash --auto
            else
              echo "⚠️ Merge conflict detected. Resolving automatically by preferring incoming changes from dev."

              # Ensure test branch exists and switch to it
              git fetch origin test || git branch test origin/test
              git checkout test

              # Merge dev into test, preferring dev changes
              git merge --strategy=recursive -X theirs dev

              # Push resolved merge back to test
              git push origin test
              
              # Close the PR with a message
              gh pr close "$PR_NUMBER" --comment "Merged automatically with incoming changes from dev."
            fi
          else
            echo "⚠️ No PR found. Exiting."
          fi
