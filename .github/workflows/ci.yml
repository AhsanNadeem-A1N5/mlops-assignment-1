name: Flake8 Lint Check

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  flake8-lint:
    name: Run Flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8 on app.py
        run: flake8 app.py

      - name: Create Pull Request if Flake8 Passes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base test --head dev --json number --jq 'length')
          if [[ "$PR_EXISTS" -eq 0 ]]; then
            gh pr create --base test --head dev --title "Merge dev into test" --body "Automatically generated PR to merge dev into test after passing Flake8 checks."
          fi

      - name: Merge Pull Request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --base test --head dev --json number --jq '.[0].number')
          if [[ -n "$PR_NUMBER" ]]; then
            gh pr merge "$PR_NUMBER" --squash --admin
          fi
