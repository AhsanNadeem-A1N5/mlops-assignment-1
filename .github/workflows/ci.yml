name: Test and Merge

on:
  push:
    branches:
      - test

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: python test.py

  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest
    needs: run-tests
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base master --head test --json number --jq 'length')
          if [[ "$PR_EXISTS" -eq 0 ]]; then
            gh pr create --base master --head test --title "Merge test into master" --body "Automatically generated PR to merge test into master after successful tests."
          fi

  merge-to-master:
    name: Merge Test to Master
    runs-on: ubuntu-latest
    needs: create-pr
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --base master --head test --json number --jq '.[0].number')
          if [[ -n "$PR_NUMBER" ]]; then
            gh pr merge "$PR_NUMBER" --squash --auto || (
              echo "⚠️ Merge conflict detected, resolving using 'theirs' strategy" &&
              git fetch origin master &&
              git checkout master &&
              git merge test -X theirs &&
              git push origin master
            )
          fi
