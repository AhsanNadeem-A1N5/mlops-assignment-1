name: CI/CD Pipeline with Jenkins Deployment

on:
  pull_request:
    branches:
      - dev
      - test
  push:
    branches:
      - master  # Trigger Jenkins when master is updated

permissions:
  contents: write
  pull-requests: write

jobs:
  lint:
    name: Code Quality Check (Flake8)
    runs-on: ubuntu-latest
    if: github.base_ref == 'dev'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Flake8
        run: flake8 app.py --count --max-line-length=100 --statistics

  test:
    name: Feature Testing (Pytest)
    runs-on: ubuntu-latest
    if: github.base_ref == 'test'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask

      - name: Run Pytest
        run: pytest test.py

  auto-merge-to-test:
    name: Auto-Merge PR to Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Enable Auto-Merge for PRs to Test
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

  merge-test-to-master:
    name: Merge Test to Master
    runs-on: ubuntu-latest
    needs: [auto-merge-to-test]
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and Merge PR to Master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base master --head test --title "Auto-merge test -> master" --body "Merging test branch into master after successful tests." || true
          gh pr merge --auto --squash "$(gh pr list --base master --head test --json url --jq '.[0].url')" || true

  trigger-jenkins:
    name: Trigger Jenkins Job
    runs-on: ubuntu-latest
    needs: [merge-test-to-master]  # Runs only after master is updated

    steps:
      - name: Notify Jenkins
        run: |
          curl -X POST "$JENKINS_URL/job/$JENKINS_JOB_NAME/buildWithParameters?token=$JENKINS_API_TOKEN"
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_JOB_NAME: "Build-and-Push-Docker"
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
