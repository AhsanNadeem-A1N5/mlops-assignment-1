name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  flake8-lint:
    name: Run Flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8 on app.py
        run: flake8 app.py

      - name: Create Pull Request if Flake8 Passes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base test --head dev --json number --jq 'length')
          if [[ "$PR_EXISTS" -eq 0 ]]; then
            gh pr create --base test --head dev --title "Merge dev into test" --body "Automatically generated PR to merge dev into test after passing Flake8 checks."
          fi
      
      - name: Check PR Mergeability
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --base test --head dev --json number --jq '.[0].number')
          if [[ -n "$PR_NUMBER" ]]; then
            MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable --jq '.mergeable')
            echo "Mergeable status: $MERGEABLE"
            if [[ "$MERGEABLE" == "MERGEABLE" ]]; then
              gh pr merge "$PR_NUMBER" --squash --auto
            else
              echo "❌ PR #$PR_NUMBER is not mergeable. Resolve conflicts manually."
              exit 1
            fi
          fi
