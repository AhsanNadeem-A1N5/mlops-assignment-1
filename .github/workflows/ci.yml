name: Flake8 Lint Check

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  flake8-lint:
    name: Run Flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8 on app.py
        run: flake8 app.py